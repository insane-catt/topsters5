<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>Topsters 5</title>

    <!-- Favicon (SVG scales crisply at any tab/bookmark size) -->
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

    <!-- CSS stylesheet(s) -->
    <link
      rel="stylesheet"
      type="text/css"
      href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css"
    />
    <link rel="stylesheet" type="text/css" href="css/index.css" />
  </head>

  <body>
    <div id="container" class="d-flex">
      <aside class="d-flex flex-column text-white">
        <!-- Mobile Tab Bar -->
        <div id="mobileTabBar">
          <button class="mobile-tab" onclick="mobileTab('charts')">Charts</button>
          <button class="mobile-tab" onclick="mobileTab('options')">Options</button>
          <button class="mobile-tab mobile-tab-active" onclick="mobileTab('search')">Search</button>
        </div>

        <!-- Charts Panel (desktop sidebar + mobile panel) -->
        <div id="tabCharts" class="d-md-flex flex-column pl-4 py-4 mobile-panel">

        <!-- Chart List -->
        <div id="chartList" class="overflow-auto text-center">
          <button
            id="createChart"
            class="btn btn-light btn-sm"
            data-toggle="modal"
            data-target="#createChartModal"
          >
            Create New Chart
          </button>
        </div>

        <hr class="hr-border w-100" />
        </div><!-- /tabCharts -->

        <!-- Options Panel -->
        <div id="tabOptions" class="mobile-panel px-3 py-3">

        <!-- Options -->
        <p>
          <a
            id="optionsArrow"
            class="text-white text-decoration-none"
            data-toggle="collapse"
            href="#options"
            role="button"
            aria-expanded="false"
            aria-controls="options"
            onclick="optionsArrow()"
            >Options &#9660;</a
          >
        </p>
        <section class="collapse" id="options">
          <div>
            <label for="gridRadio">Grid</label>
            <input
              type="radio"
              id="gridRadio"
              name="chartType"
              autocomplete="off"
              onclick="chartType(true)"
            />
            <label for="collageRadio">Collage</label>
            <input
              type="radio"
              id="collageRadio"
              name="chartType"
              autocomplete="off"
              onclick="chartType(false)"
            />
          </div>
          <table id="chartSize">
            <tr>
              <td><label for="rows">Rows</label></td>
              <td>
                <input
                  type="range"
                  id="rows"
                  min="1"
                  max="12"
                  autocomplete="off"
                  oninput="chartSize()"
                />
              </td>
              <td id="rowsNum"></td>
            </tr>
            <tr>
              <td><label for="cols">Cols</label></td>
              <td>
                <input
                  type="range"
                  id="cols"
                  min="1"
                  max="12"
                  autocomplete="off"
                  oninput="chartSize()"
                />
              </td>
              <td id="colsNum"></td>
            </tr>
          </table>
          <div id="chartLength">
            <label for="tiles">Tiles</label>
            <input
              type="number"
              id="tiles"
              min="1"
              max="100"
              autocomplete="off"
              onchange="chartLength()"
            />
          </div>
          <table>
            <tr>
              <td><label for="outerPadding">Outer Padding</label></td>
              <td>
                <input
                  type="range"
                  id="outerPadding"
                  min="0"
                  max="30"
                  autocomplete="off"
                  oninput="outerPadding()"
                />
              </td>
              <td id="outerPaddingNum"></td>
            </tr>
            <tr>
              <td><label for="innerPadding">Inner Padding</label></td>
              <td>
                <input
                  type="range"
                  id="innerPadding"
                  min="0"
                  max="20"
                  autocomplete="off"
                  oninput="innerPadding()"
                />
              </td>
              <td id="innerPaddingNum"></td>
            </tr>
          </table>
          <input type="checkbox" id="titleToggle" autocomplete="off" onclick="titleToggle()" />
          <label for="titleToggle">Album Titles</label><br />
          <label for="fonts">Font:</label>
          <select id="fonts" onchange="changeFont()">
            <option value="Arial">Arial</option>
            <option value="Courier">Courier</option>
            <option value="'Franklin Gothic Medium'"
              >Franklin Gothic Medium</option
            >
            <option value="Georgia">Georgia</option>
            <option value="Helvetica">Helvetica</option>
            <option value="'Proxima Nova'">Proxima Nova</option>
            <option value="'Times New Roman'">Times New Roman</option>
          </select>
          <div
            class="d-flex flex-row justify-content-between align-items-center"
          >
            <label for="background">Background: </label>
            <input
              type="text"
              id="background"
              class="w-50"
              placeholder="URL / Color"
              onchange="background()"
            />
            <input type="color" id="colorPicker" onchange="backgroundColor()" />
          </div>
        </section>

        <hr class="hr-border w-100" />
        </div><!-- /tabOptions -->

        <!-- Search Panel -->
        <div id="tabSearch" class="mobile-panel mobile-panel-active px-3 py-3">

        <!-- Search Engine -->
        <div
          class="d-flex flex-row justify-content-between align-items-center mb-2"
        >
          <span>Album Search:</span>
          <button class="btn btn-light btn-sm" onclick="getAlbums()">
            Search
          </button>
        </div>
        <div class="d-flex flex-row mb-3">
          <input
            id="albumSearch"
            type="text"
            placeholder="Artist and/or album"
            class="w-100"
            onfocus="checkEnter()"
          />
        </div>
        <!-- Custom Image -->
        <div
          class="d-flex flex-row justify-content-between align-items-center mb-2"
        >
          <span>Custom Image:</span>
          <button class="btn btn-light btn-sm" onclick="addCustomImage()">
            Search
          </button>
        </div>
        <input
          id="customImageURL"
          type="text"
          placeholder="Image URL"
          class="w-100 mb-1"
        />
        <div class="d-flex flex-row mb-3">
          <input
            id="customArtist"
            type="text"
            placeholder="Artist"
            class="w-50"
          />
          <input
            id="customAlbum"
            type="text"
            placeholder="Album"
            class="w-50"
          />
        </div>

        <hr class="hr-border w-100" />

        <div
          id="results"
          class="d-flex flex-row flex-wrap flex-grow-1 flex-shrink-1 overflow-auto"
        ></div>
        </div><!-- /tabSearch -->

        <!-- New Chart Modal (outside hidden panels so it works on mobile) -->
        <div
          class="modal fade"
          id="createChartModal"
          tabindex="-1"
          role="dialog"
          aria-labelledby="createChartModal"
          aria-hidden="true"
        >
          <div class="modal-dialog" role="document">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title">Create New Chart</h5>
                <button
                  class="close"
                  data-dismiss="modal"
                  aria-label="Close"
                  onClick="storeToJSON()"
                >
                  <span aria-hidden="true">&times;</span>
                </button>
              </div>
              <div class="modal-body">
                <label for="chartName">Name of Chart:</label><br />
                <input type="text" id="chartName" onfocus="checkEnter()" />
              </div>
              <div class="modal-footer">
                <button
                  class="btn btn-light text-dark rounded-0"
                  data-dismiss="modal"
                >
                  Cancel
                </button>
                <button
                  id="btnCreate"
                  class="btn btn-light text-dark rounded-0"
                  onclick="newChart()"
                  data-dismiss="modal"
                >
                  Create
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Delete Chart Confirmation (outside hidden panels so it works on mobile) -->
        <div
          class="modal fade"
          id="deleteChartModal"
          tabindex="-1"
          role="dialog"
          aria-labelledby="deleteChartModal"
          aria-hidden="true"
        >
          <div class="modal-dialog" role="document">
            <div class="modal-content">
              <div class="modal-header">
                <h5 id="deleteTitle" class="modal-title"></h5>
                <button
                  class="close"
                  data-dismiss="modal"
                  aria-label="Close"
                  onClick="storeToJSON()"
                >
                  <span aria-hidden="true">&times;</span>
                </button>
              </div>
              <div class="modal-footer">
                <button
                  class="btn btn-light text-dark rounded-0"
                  data-dismiss="modal"
                >
                  No
                </button>
                <button
                  id="btnDelete"
                  class="btn btn-light text-dark rounded-0"
                  data-dismiss="modal"
                >
                  Yes
                </button>
              </div>
            </div>
          </div>
        </div>
      </aside>

      <main class="p-4 flex-grow-1">
        <header class="d-flex flex-row justify-content-end mb-4">
          <!-- Export Button -->
          <button
            id="exportJSON"
            class="btn btn-light rounded-0 mr-2"
            onclick="exportToJSON()"
          >
            Export to JSON
          </button>

          <!-- Import Button -->
          <div class="dropdown">
            <button
              class="btn btn-light rounded-0 mr-2 dropdown-toggle"
              id="dropdownMenuButton"
              data-toggle="dropdown"
              aria-haspopup="true"
              aria-expanded="false"
            >
              Import
            </button>
            <ul
              class="dropdown-menu dropdown-menu-right"
              aria-labelledby="dropdownMenuButton"
            >
              <li
                class="dropdown-item"
                data-toggle="modal"
                data-target="#jsonImportModal"
              >
                ...from JSON
              </li>
              <li
                class="dropdown-item"
                data-toggle="modal"
                data-target="#rymImportModal"
              >
                ...from RateYourMusic
              </li>
              <li
                class="dropdown-item"
                data-toggle="modal"
                data-target="#imgImportModal"
              >
                ...from Custom Image
              </li>
              <li
                class="dropdown-item"
                data-toggle="modal"
                data-target="#lastfmImportModal"
              >
                ...from Last.fm
              </li>
            </ul>
          </div>

          <!-- JSON Import Modal -->
          <div
            class="modal fade"
            id="jsonImportModal"
            tabindex="-1"
            role="dialog"
            aria-labelledby="jsonImportModal"
            aria-hidden="true"
          >
            <div class="modal-dialog" role="document">
              <div class="modal-content">
                <div class="modal-header">
                  <h5 class="modal-title">JSON Import Data</h5>
                  <button
                    class="close"
                    data-dismiss="modal"
                    aria-label="Close"
                    onClick="storeToJSON()"
                  >
                    <span aria-hidden="true">&times;</span>
                  </button>
                </div>
                <div class="modal-body">
                  <input id="jsonImport" type="file" />
                </div>
                <div class="modal-footer">
                  <button
                    class="btn btn-light text-dark rounded-0"
                    data-dismiss="modal"
                  >
                    Cancel
                  </button>
                  <button
                    id="btnCreate"
                    class="btn btn-light text-dark rounded-0"
                    onclick="importFromJSON()"
                    data-dismiss="modal"
                  >
                    Import
                  </button>
                </div>
              </div>
            </div>
          </div>

          <!-- RYM Import Modal -->
          <div
            class="modal fade"
            id="rymImportModal"
            tabindex="-1"
            role="dialog"
            aria-labelledby="rymImportModal"
            aria-hidden="true"
          >
            <div class="modal-dialog" role="document">
              <div class="modal-content">
                <div class="modal-header">
                  <h5 class="modal-title">RYM Import Data</h5>
                  <button
                    class="close"
                    data-dismiss="modal"
                    aria-label="Close"
                    onClick="storeToJSON()"
                  >
                    <span aria-hidden="true">&times;</span>
                  </button>
                </div>
                <div class="modal-body">
                  <input id="csvImport" type="file" />
                </div>
                <div class="modal-footer">
                  <button
                    class="btn btn-light text-dark rounded-0"
                    data-dismiss="modal"
                  >
                    Cancel
                  </button>
                  <button
                    id="btnCreate"
                    class="btn btn-light text-dark rounded-0"
                    onclick="importFromRYM()"
                    data-dismiss="modal"
                  >
                    Import
                  </button>
                </div>
              </div>
            </div>
          </div>

          <!-- Custom Image Modal -->
          <div
            class="modal fade"
            id="imgImportModal"
            tabindex="-1"
            role="dialog"
            aria-labelledby="imgImportModal"
            aria-hidden="true"
          >
            <div class="modal-dialog" role="document">
              <div class="modal-content">
                <div class="modal-header">
                  <h5 class="modal-title">Custom Image</h5>
                  <button
                    class="close"
                    data-dismiss="modal"
                    aria-label="Close"
                    onClick="storeToJSON()"
                  >
                    <span aria-hidden="true">&times;</span>
                  </button>
                </div>
                <div class="modal-body">
                  <input
                    type="radio"
                    name="imgImportRadio"
                    id="imgImportFileRadio"
                    onclick="imgImportMode(true)"
                  />
                  <label for="imgImportFileRadio">File</label>
                  <input
                    type="radio"
                    name="imgImportRadio"
                    id="imgImportURLRadio"
                    onclick="imgImportMode(false)"
                  />
                  <label for="imgImportURLRadio">URL</label>
                  <div id="imgImportFileDiv">
                    <label for="imgImportFile">Image File:</label><br />
                    <input id="imgImportFile" type="file" accept="image/*" />
                  </div>
                  <div id="imgImportURLDiv">
                    <label for="imgImportURL">Image URL:</label><br />
                    <input id="imgImportURL" type="text" />
                  </div>
                  <label for="imgTitle" class="mt-3">Title:</label><br />
                  <input type="text" id="imgTitle" />
                </div>
                <div class="modal-footer">
                  <button
                    class="btn btn-light text-dark rounded-0"
                    data-dismiss="modal"
                  >
                    Cancel
                  </button>
                  <button
                    id="btnCreate"
                    class="btn btn-light text-dark rounded-0"
                    onclick="importFromImage()"
                    data-dismiss="modal"
                  >
                    Import
                  </button>
                </div>
              </div>
            </div>
          </div>

          <!-- Last.fm Import Modal -->
          <div
            class="modal fade"
            id="lastfmImportModal"
            tabindex="-1"
            role="dialog"
            aria-labelledby="lastfmImportModal"
            aria-hidden="true"
          >
            <div class="modal-dialog" role="document">
              <div class="modal-content">
                <div class="modal-header">
                  <h5 class="modal-title">Import from Last.fm</h5>
                  <button
                    class="close"
                    data-dismiss="modal"
                    aria-label="Close"
                    onClick="storeToJSON()"
                  >
                    <span aria-hidden="true">&times;</span>
                  </button>
                </div>
                <div class="modal-body">
                  <label for="lastfmUsername">Last.fm Username:</label><br />
                  <input
                    type="text"
                    id="lastfmUsername"
                    autocomplete="off"
                    onfocus="checkEnter()"
                  /><br />
                  <label for="lastfmPeriod" class="mt-3">Period:</label><br />
                  <select id="lastfmPeriod">
                    <option value="overall">Overall</option>
                    <option value="7day">7 days</option>
                    <option value="1month">1 month</option>
                    <option value="3month">3 months</option>
                    <option value="6month">6 months</option>
                    <option value="12month">12 months</option>
                  </select>
                </div>
                <div class="modal-footer">
                  <button
                    class="btn btn-light text-dark rounded-0"
                    data-dismiss="modal"
                  >
                    Cancel
                  </button>
                  <button
                    id="btnLastfmImport"
                    class="btn btn-light text-dark rounded-0"
                    onclick="importFromLastfm()"
                    data-dismiss="modal"
                  >
                    Import
                  </button>
                </div>
              </div>
            </div>
          </div>

          <!-- Download Button -->
          <div class="dropdown">
            <button
              class="btn btn-light rounded-0 dropdown-toggle"
              id="downloadBtn"
              data-toggle="dropdown"
              aria-haspopup="true"
              aria-expanded="false"
            >
              Download
            </button>
            <ul
              class="dropdown-menu dropdown-menu-right"
              aria-labelledby="downloadBtn"
            >
              <li class="dropdown-item" onclick="chartToImage('jpg')">
                ...as JPG
              </li>
              <li class="dropdown-item" onclick="chartToImage('png')">
                ...as PNG
              </li>
            </ul>
          </div>
        </header>

        <!-- Chart -->
        <div id="chartScrollWrapper">
          <div id="chartContainer" class="d-flex flex-row mx-auto">
            <div
              id="chart"
              class="d-flex flex-row flex-wrap justify-content-center flex-grow-1"
            ></div>
            <div id="titles"></div>
          </div>
        </div>
      </main>
    </div>

    <!-- Libraries -->
    <script
      src="https://code.jquery.com/jquery-3.3.1.min.js"
      integrity="sha256-FgpCb/KJQlLNfOu91ta32o/NMZxltwRo8QtmkMRdAu8="
      crossorigin="anonymous"
    ></script>
    <script
      src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"
      integrity="sha256-VazP97ZCwtekAsvgPBSUwPFKdrwD3unUfSGVYrahUqU="
      crossorigin="anonymous"
    ></script>
    <script src="js/jquery.ui.touch-punch.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
      integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"
      integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6"
      crossorigin="anonymous"
    ></script>
    <script src="js/jquery-csv.min.js"></script>

    <!-- My script(s) -->
    <script src="js/script.js"></script>
  </body>
</html>
